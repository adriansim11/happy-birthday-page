<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生日快乐 | Celestial Memory</title>
  <style>
    :root {
      color-scheme: dark;
      --gold: #ffe2a9;
      --rose: #ff8fbf;
      --cyan: #9ceaff;
      --text: #fff8ed;
      --muted: rgba(255, 248, 237, 0.68);
      --glass: rgba(10, 12, 22, 0.44);
      --line: rgba(255, 226, 169, 0.24);
      --mx: 0px;
      --my: 0px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #03040a;
      color: var(--text);
      font-family: "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at calc(50% + var(--mx) * 0.02) 18%, rgba(255, 226, 169, 0.18), transparent 26%),
        radial-gradient(circle at calc(76% - var(--mx) * 0.015) 30%, rgba(156, 234, 255, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(5, 7, 18, 0.16), rgba(2, 3, 8, 0.92) 78%);
      mix-blend-mode: screen;
      animation: atmosphere 8s ease-in-out infinite alternate;
      z-index: 1;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(circle at 50% 45%, black, transparent 72%);
      opacity: 0.42;
      z-index: 1;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(18px, 3vw, 36px);
    }

    .topbar,
    .control-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: min(1180px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(22px);
      border-radius: 8px;
    }

    .topbar {
      min-height: 58px;
      padding: 0 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 248, 237, 0.86);
      font-size: 13px;
      letter-spacing: 0;
    }

    .brand-mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 32%, white, rgba(255, 226, 169, 0.76) 20%, transparent 42%),
        conic-gradient(from 120deg, var(--gold), var(--rose), var(--cyan), var(--gold));
      box-shadow: 0 0 26px rgba(255, 226, 169, 0.38);
      animation: slowSpin 9s linear infinite;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      appearance: none;
      position: relative;
      min-height: 42px;
      border: 1px solid rgba(255, 226, 169, 0.25);
      border-radius: 999px;
      padding: 10px 15px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.045);
      font: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      transform: translateX(-120%);
      transition: transform 600ms ease;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 226, 169, 0.72);
      box-shadow: 0 0 34px rgba(255, 226, 169, 0.16);
    }

    button:hover::after {
      transform: translateX(120%);
    }

    .music.playing,
    .wish-chip.active {
      color: #20170f;
      background: linear-gradient(135deg, rgba(255, 226, 169, 0.96), rgba(255, 143, 191, 0.76));
      border-color: rgba(255, 248, 237, 0.78);
      box-shadow: 0 0 36px rgba(255, 226, 169, 0.24);
    }

    .scene {
      position: relative;
      width: min(1180px, 100%);
      min-height: 660px;
      margin: clamp(18px, 4vh, 42px) auto 18px;
      border: 1px solid rgba(255, 226, 169, 0.14);
      border-radius: 8px;
      overflow: hidden;
      background:
        radial-gradient(circle at 51% 48%, rgba(255, 226, 169, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(6, 8, 20, 0.34), rgba(2, 3, 9, 0.72));
      box-shadow:
        0 50px 120px rgba(0, 0, 0, 0.52),
        inset 0 0 100px rgba(255, 226, 169, 0.035);
      transform: perspective(1200px) rotateX(calc(var(--my) * -0.006deg)) rotateY(calc(var(--mx) * 0.006deg));
      transition: transform 120ms linear;
      cursor: pointer;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 226, 169, 0.24), transparent 24%),
        linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.18) 46%, rgba(156, 234, 255, 0.12) 54%, transparent 100%);
      opacity: 0;
      transform: translateX(-110%) scale(1.04);
    }

    .scene.is-transitioning::after {
      animation: portalSweep 900ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scene.is-transitioning .hero-copy,
    .scene.is-transitioning .message {
      filter: blur(10px);
      opacity: 0;
      transform: translate3d(calc(var(--mx) * -0.012px - 10px), calc(var(--my) * -0.012px + 22px), 0) scale(0.985);
      transition: opacity 420ms ease, filter 420ms ease, transform 420ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .scene.is-entering .hero-copy {
      animation: copyArrive 760ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .scene.is-entering .message.show {
      animation: messageArrive 820ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .scene[data-chapter="1"] .planet.large {
      left: -30%;
      top: 12%;
      transform: scale(0.96);
    }

    .scene[data-chapter="1"] .planet.mid {
      right: 12%;
      top: 17%;
      transform: scale(0.88);
    }

    .scene[data-chapter="1"] .ring-planet {
      right: 16%;
      top: 34%;
    }

    .scene[data-chapter="2"] {
      background:
        radial-gradient(circle at 62% 38%, rgba(255, 143, 191, 0.16), transparent 24%),
        linear-gradient(180deg, rgba(10, 7, 22, 0.50), rgba(2, 3, 9, 0.76));
    }

    .scene[data-chapter="2"] .planet.large {
      left: 58%;
      top: 8%;
      opacity: 0.18;
      transform: scale(0.66);
    }

    .scene[data-chapter="2"] .planet.mid {
      right: 40%;
      top: 16%;
      opacity: 0.28;
      transform: scale(0.82);
    }

    .scene[data-chapter="2"] .planet.small {
      right: 42%;
      top: 8%;
    }

    .scene[data-chapter="2"] .ring-planet {
      right: 47%;
      top: 35%;
      transform: rotate(-8deg) scale(1.1);
    }

    .scene[data-chapter="2"] .hero-copy {
      left: auto;
      right: clamp(28px, 4.4vw, 58px);
      bottom: 252px;
      max-width: min(390px, 32vw);
    }

    .scene[data-chapter="2"] .message {
      left: auto;
      right: clamp(28px, 4.4vw, 58px);
      top: auto;
      bottom: 96px;
      width: min(390px, 32vw);
    }

    .scene[data-chapter="4"] {
      background:
        radial-gradient(circle at 46% 34%, rgba(255, 226, 169, 0.16), transparent 28%),
        radial-gradient(circle at 76% 36%, rgba(255, 143, 191, 0.12), transparent 26%),
        linear-gradient(180deg, rgba(10, 7, 22, 0.48), rgba(2, 3, 9, 0.82));
    }

    .scene[data-chapter="4"] .planet.large {
      left: 63%;
      top: 6%;
      opacity: 0.16;
      transform: scale(0.72);
    }

    .scene[data-chapter="4"] .planet.mid {
      right: 66%;
      top: 18%;
      opacity: 0.18;
      transform: scale(0.96);
    }

    .scene[data-chapter="4"] .ring-planet {
      right: 8%;
      top: 42%;
      opacity: 0.30;
      transform: rotate(-8deg) scale(1.24);
    }

    .scene[data-chapter="4"] .hero-copy,
    .scene[data-chapter="4"] .message {
      display: none;
      opacity: 0;
      pointer-events: none;
    }

    .planet {
      position: absolute;
      border-radius: 50%;
      z-index: 1;
      filter: drop-shadow(0 0 38px rgba(255, 226, 169, 0.24));
      animation: planetDrift 12s ease-in-out infinite alternate;
      will-change: transform, left, right, top, opacity;
      transition:
        left 950ms cubic-bezier(0.16, 1, 0.3, 1),
        right 950ms cubic-bezier(0.16, 1, 0.3, 1),
        top 950ms cubic-bezier(0.16, 1, 0.3, 1),
        transform 950ms cubic-bezier(0.16, 1, 0.3, 1),
        opacity 650ms ease,
        filter 650ms ease;
    }

    .planet.large {
      width: clamp(220px, 30vw, 420px);
      aspect-ratio: 1;
      left: -32%;
      top: 14%;
      opacity: 0.38;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.92), rgba(255, 226, 169, 0.86) 13%, rgba(116, 83, 127, 0.74) 38%, rgba(18, 24, 50, 0.18) 67%, transparent 70%),
        repeating-linear-gradient(18deg, rgba(255, 255, 255, 0.12) 0 3px, transparent 3px 12px);
    }

    .planet.mid {
      width: clamp(110px, 15vw, 190px);
      aspect-ratio: 1;
      right: 26%;
      top: 20%;
      background: radial-gradient(circle at 38% 31%, #fff8ed, #d49be6 20%, #514384 58%, transparent 70%);
      animation-delay: -4s;
    }

    .planet.small {
      width: clamp(72px, 9vw, 120px);
      aspect-ratio: 1;
      right: 10%;
      top: 11%;
      background: radial-gradient(circle at 37% 28%, #ffffff, #9ceaff 20%, #293d72 58%, transparent 70%);
      animation-delay: -7s;
    }

    .ring-planet {
      position: absolute;
      width: clamp(180px, 22vw, 300px);
      height: clamp(70px, 9vw, 118px);
      right: 4%;
      top: 27%;
      border: 1px solid rgba(255, 226, 169, 0.34);
      border-radius: 50%;
      transform: rotate(-17deg);
      filter: blur(0.2px);
      opacity: 0.72;
      animation: ringPulse 6s ease-in-out infinite;
      will-change: transform, right, top, opacity;
      transition:
        right 950ms cubic-bezier(0.16, 1, 0.3, 1),
        top 950ms cubic-bezier(0.16, 1, 0.3, 1),
        transform 950ms cubic-bezier(0.16, 1, 0.3, 1),
        opacity 650ms ease;
    }

    .mountains,
    .water {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }

    .mountains {
      height: 42%;
      background:
        linear-gradient(145deg, transparent 0 22%, rgba(5, 7, 12, 0.98) 22.5% 34%, transparent 34.5%),
        linear-gradient(210deg, transparent 0 28%, rgba(7, 8, 15, 0.98) 28.5% 47%, transparent 47.5%),
        linear-gradient(165deg, transparent 0 37%, rgba(3, 4, 10, 1) 37.5% 54%, transparent 54.5%),
        linear-gradient(180deg, transparent 0 48%, #030409 49%);
      filter: drop-shadow(0 -12px 24px rgba(255, 226, 169, 0.08));
      z-index: 3;
    }

    .water {
      height: 29%;
      z-index: 4;
      background:
        radial-gradient(ellipse at 50% 4%, rgba(255, 226, 169, 0.18), transparent 24%),
        radial-gradient(ellipse at 54% 14%, rgba(255, 143, 191, 0.16), transparent 38%),
        linear-gradient(180deg, rgba(25, 18, 42, 0.22), rgba(2, 4, 10, 0.96));
      box-shadow: inset 0 1px 0 rgba(255, 226, 169, 0.10), inset 0 38px 70px rgba(156, 234, 255, 0.025);
      transform-origin: top;
      animation: waterMove 4.6s ease-in-out infinite alternate;
    }

    .memory-card {
      position: absolute;
      z-index: 6;
      margin: 0;
      left: 50%;
      top: clamp(34px, 6vh, 52px);
      width: min(700px, 68vw);
      padding: 13px;
      border: 1px solid rgba(255, 226, 169, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 248, 237, 0.10), rgba(255, 143, 191, 0.035)),
        rgba(4, 6, 15, 0.50);
      box-shadow: 0 34px 90px rgba(0, 0, 0, 0.42), 0 0 44px rgba(255, 226, 169, 0.08);
      backdrop-filter: blur(22px);
      opacity: 0;
      pointer-events: none;
      transform: translate3d(-50%, 18px, 0) scale(0.985);
      transition: opacity 680ms ease, transform 780ms cubic-bezier(0.16, 1, 0.3, 1), filter 680ms ease;
      will-change: transform, opacity, filter;
    }

    .scene[data-chapter="4"] .memory-card {
      opacity: 1;
      pointer-events: auto;
      transform: translate3d(-50%, 0, 0) scale(1);
    }

    .memory-title {
      margin: 0 0 10px;
      color: rgba(255, 226, 169, 0.90);
      font-size: clamp(14px, 1.6vw, 18px);
      line-height: 1.45;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.68);
    }

    .memory-photo {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid rgba(255, 248, 237, 0.18);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .memory-note {
      margin: 10px 0 0;
      color: rgba(255, 248, 237, 0.76);
      font-size: 14px;
      line-height: 1.62;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 420ms ease, max-height 520ms ease;
    }

    .memory-card.is-nino .memory-note {
      opacity: 1;
      max-height: 80px;
    }

    .memory-hotspot {
      position: absolute;
      left: 58.8%;
      top: 58.5%;
      width: clamp(34px, 4vw, 48px);
      min-height: 0;
      aspect-ratio: 1;
      padding: 0;
      border-radius: 50%;
      border: 1px solid rgba(255, 226, 169, 0.58);
      background:
        radial-gradient(circle, rgba(255, 248, 237, 0.95), rgba(255, 226, 169, 0.62) 28%, rgba(255, 143, 191, 0.22) 54%, transparent 70%);
      box-shadow: 0 0 0 9px rgba(255, 226, 169, 0.08), 0 0 34px rgba(255, 226, 169, 0.46);
      transform: translate(-50%, -50%);
      animation: hotspotPulse 1.9s ease-in-out infinite;
    }

    .memory-hotspot::after {
      display: none;
    }

    .memory-card.is-nino .memory-hotspot {
      opacity: 0;
      pointer-events: none;
    }

    .hero-copy {
      position: absolute;
      z-index: 6;
      left: clamp(28px, 6vw, 76px);
      bottom: clamp(120px, 22vh, 190px);
      max-width: 560px;
      transform: translate3d(calc(var(--mx) * -0.012px), calc(var(--my) * -0.012px), 0);
      transition: opacity 520ms ease, filter 520ms ease, transform 520ms ease;
      will-change: transform, opacity, filter;
    }

    .hero-copy::before {
      content: "";
      position: absolute;
      inset: -24px -34px -22px -30px;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 18% 44%, rgba(2, 3, 8, 0.94), transparent 62%),
        linear-gradient(90deg, rgba(2, 3, 8, 0.78), rgba(2, 3, 8, 0.30), transparent);
      filter: blur(10px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 226, 169, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: rgba(255, 226, 169, 0.88);
      backdrop-filter: blur(18px);
      font-size: 13px;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.32);
    }

    h1 {
      margin: 18px 0 18px;
      font-size: clamp(54px, 7.4vw, 96px);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow:
        0 3px 0 rgba(0, 0, 0, 0.26),
        0 4px 24px rgba(0, 0, 0, 0.88),
        0 0 26px rgba(255, 226, 169, 0.34),
        0 0 80px rgba(255, 143, 191, 0.16);
      animation: titleGlow 4.8s ease-in-out infinite;
    }

    .hero-copy p {
      margin: 0;
      color: var(--muted);
      max-width: min(500px, 52vw);
      font-size: clamp(16px, 1.8vw, 20px);
      line-height: 1.78;
      text-wrap: pretty;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.88);
    }

    .control-panel {
      min-height: 76px;
      padding: 12px;
      flex-wrap: wrap;
    }

    .wish-set {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chapter-dots {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 0 8px;
    }

    .chapter-dot {
      width: 9px;
      height: 9px;
      min-height: 9px;
      padding: 0;
      border-radius: 999px;
      border-color: rgba(255, 226, 169, 0.26);
      background: rgba(255, 255, 255, 0.10);
      box-shadow: none;
    }

    .chapter-dot.active {
      width: 28px;
      background: linear-gradient(90deg, var(--gold), var(--rose));
      border-color: rgba(255, 248, 237, 0.62);
      box-shadow: 0 0 22px rgba(255, 226, 169, 0.22);
    }

    .tap-hint {
      position: absolute;
      z-index: 10;
      right: 22px;
      bottom: 18px;
      padding: 9px 13px;
      border-radius: 999px;
      color: rgba(255, 248, 237, 0.62);
      background: rgba(5, 7, 16, 0.36);
      border: 1px solid rgba(255, 226, 169, 0.16);
      backdrop-filter: blur(18px);
      font-size: 13px;
      pointer-events: none;
      animation: hintPulse 2.8s ease-in-out infinite;
    }

    .wish-chip {
      min-height: 38px;
      padding: 9px 13px;
      color: rgba(255, 248, 237, 0.78);
      font-size: 14px;
    }

    .status-line {
      color: rgba(255, 248, 237, 0.56);
      font-size: 13px;
      font-family: "SFMono-Regular", Consolas, monospace;
    }

    .message {
      position: absolute;
      z-index: 7;
      right: clamp(24px, 4vw, 56px);
      top: clamp(330px, 46%, 410px);
      bottom: auto;
      width: min(340px, calc(100% - 48px));
      padding: 18px 20px;
      border: 1px solid rgba(255, 226, 169, 0.22);
      border-radius: 8px;
      background: rgba(6, 8, 18, 0.48);
      backdrop-filter: blur(24px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.32), inset 0 0 40px rgba(255, 226, 169, 0.04);
      color: rgba(255, 248, 237, 0.82);
      line-height: 1.76;
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 520ms ease, filter 520ms ease, transform 520ms ease;
      will-change: transform, opacity, filter;
    }

    .scene[data-chapter="1"] .hero-copy {
      max-width: 460px;
      bottom: clamp(130px, 23vh, 184px);
    }

    .scene[data-chapter="1"] .hero-copy p {
      max-width: min(430px, 40vw);
    }

    .scene[data-chapter="1"] .message {
      top: clamp(332px, 45%, 400px);
    }

    .message.show {
      animation: revealMessage 620ms ease forwards;
    }

    @keyframes atmosphere {
      to {
        opacity: 0.78;
        filter: saturate(1.16);
      }
    }

    @keyframes slowSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes planetDrift {
      to {
        transform: translate3d(10px, -14px, 0) scale(1.025);
      }
    }

    @keyframes ringPulse {
      50% {
        opacity: 1;
        box-shadow: 0 0 34px rgba(255, 226, 169, 0.14);
      }
    }

    @keyframes waterMove {
      to {
        filter: brightness(1.16);
        transform: scaleY(1.04) translateY(2px);
      }
    }

    @keyframes titleGlow {
      50% {
        filter: drop-shadow(0 0 24px rgba(255, 226, 169, 0.38));
      }
    }

    @keyframes revealMessage {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes copyArrive {
      from {
        opacity: 0;
        filter: blur(12px);
        transform: translate3d(calc(var(--mx) * -0.012px + 18px), calc(var(--my) * -0.012px + 18px), 0) scale(0.985);
      }
      to {
        opacity: 1;
        filter: blur(0);
        transform: translate3d(calc(var(--mx) * -0.012px), calc(var(--my) * -0.012px), 0) scale(1);
      }
    }

    @keyframes messageArrive {
      from {
        opacity: 0;
        filter: blur(10px);
        transform: translateY(20px) scale(0.985);
      }
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0) scale(1);
      }
    }

    @keyframes portalSweep {
      0% {
        opacity: 0;
        transform: translateX(-110%) scale(1.04);
      }
      35% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateX(110%) scale(1.04);
      }
    }

    @keyframes hintPulse {
      0%, 100% {
        opacity: 0.56;
        transform: translateY(0);
      }
      50% {
        opacity: 0.92;
        transform: translateY(-2px);
      }
    }

    @keyframes hotspotPulse {
      0%, 100% {
        opacity: 0.70;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.12);
      }
    }

    @media (max-width: 820px) {
      html,
      body {
        overflow-y: auto;
      }

      main {

  <script>
    const canvas = document.getElementById("space");
    const ctx = canvas.getContext("2d");
    const scene = document.getElementById("scene");
    const launch = document.getElementById("launch");
    const musicToggle = document.getElementById("musicToggle");
    const message = document.getElementById("message");
    const wishText = document.getElementById("wishText");
    const statusLine = document.getElementById("statusLine");
    const chips = document.querySelectorAll(".wish-chip");
    const chapterDots = document.querySelectorAll(".chapter-dot");
    const eyebrow = document.querySelector(".eyebrow");
    const heading = document.querySelector("h1");
    const memoryCard = document.getElementById("memoryCard");
    const memoryPhoto = document.getElementById("memoryPhoto");
    const memoryHotspot = document.getElementById("memoryHotspot");

    let width = 0;
    let height = 0;
    let stars = [];
    let particles = [];
    let waves = [];
    let meteors = [];
    let nextMeteor = 0;
    let pointer = { x: 0, y: 0, active: false, last: 0 };
    let audio = null;
    let musicLoop = null;
    let chapterIndex = 0;
    let isChangingChapter = false;
    let lastWheelAt = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let autoTimer = null;
    let autoMode = true;
    const chapters = [
      {
        eyebrow: "远航 · 今天的星系，只为你亮起",
        title: "温柔<br>远航",
        wish: "愿新的一岁像一场温柔的远航，有清晰的方向，也有被星光照亮的归途。",
        message: "大哥，生日快乐。愿你心中所想，皆有回响；眼里所望，皆能抵达。愿新的一岁把你喜欢的、期待的、正在奔赴的，都一件件送到你身边。",
        status: "SCENE 01 · 远航"
      },
      {
        eyebrow: "热爱 · 愿望正在穿过星轨",
        title: "热爱<br>有光",
        wish: "愿你的热爱一直有回响，所有坚持都在某天变成漂亮答案。",
        message: "大哥，愿你的热爱永远不被辜负；每一次认真、每一次坚持，都在未来某个时刻变成照亮你的漂亮答案。",
        status: "SCENE 02 · 热爱"
      },
      {
        eyebrow: "好运 · 祝福已抵达坐标",
        title: "好运<br>常在",
        wish: "愿好运不是偶尔路过，而是慢慢成为你生活里的常客。",
        message: "大哥，愿好运不只是偶尔经过，而是慢慢住进你的日子里；想要的有回应，奔赴的有结果，未来继续闪耀。",
        status: "SCENE 03 · 好运"
      },
      {
        eyebrow: "陪伴 · 温柔的人都在身边",
        title: "一路<br>陪伴",
        wish: "愿你身边总有人懂你的沉默，也认真收藏你的快乐。",
        message: "大哥，愿你一路有风景，也有底气；有想要就去拿的勇敢，也有想停就能停的从容。更重要的是，身边始终有温柔的人和明亮的事。",
        status: "SCENE 04 · 陪伴"
      },
      {
        eyebrow: "温馨提示",
        title: "两个<br>彩蛋",
        wish: "轻点照片里的发光位置，打开第二个彩蛋。",
        message: "温馨提示：这里有两个彩蛋。",
        status: "SCENE 05 · 彩蛋"
      }
    ];

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      const ratio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(width * ratio);
      canvas.height = Math.floor(height * ratio);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      stars = Array.from({ length: Math.floor(Math.min(width * height / 5200, 260)) }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.4 + 0.25,
        twinkle: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.18 + 0.03
      }));
    }

    function burst(x, y, count = 120) {
      const colors = ["#ffe2a9", "#ff8fbf", "#9ceaff", "#ffffff"];
      for (let i = 0; i < count; i += 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6.5 + 0.6;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 44 + Math.random() * 70,
          size: Math.random() * 2.8 + 0.8,
          color: colors[Math.floor(Math.random() * colors.length)],
          spin: Math.random() * Math.PI,
          type: Math.random() > 0.86 ? "ring" : Math.random() > 0.72 ? "diamond" : "dot"
        });
      }
      waves.push({ x, y, radius: 4, life: 78, hue: Math.random() > 0.5 ? "255, 226, 169" : "156, 234, 255" });
    }

    function setChapter(nextIndex) {
      if (isChangingChapter) return;
      isChangingChapter = true;
      chapterIndex = (nextIndex + chapters.length) % chapters.length;
      const chapter = chapters[chapterIndex];
      scene.classList.remove("is-entering");
      scene.classList.add("is-transitioning");
      burst(width * (0.42 + Math.random() * 0.18), height * 0.42, 150);
      window.setTimeout(() => {
        scene.dataset.chapter = String(chapterIndex);
        eyebrow.textContent = chapter.eyebrow;
        heading.innerHTML = chapter.title;
        wishText.textContent = chapter.wish;
        message.textContent = chapter.message;
        statusLine.textContent = chapter.status;
        chapterDots.forEach((dot, index) => dot.classList.toggle("active", index === chapterIndex));
        chips.forEach((chip, index) => chip.classList.toggle("active", index === chapterIndex));
        if (chapterIndex > 0) message.classList.add("show");
        else message.classList.remove("show");
        window.requestAnimationFrame(() => scene.classList.add("is-entering"));
      }, 320);
      window.setTimeout(() => {
        scene.classList.remove("is-transitioning");
        isChangingChapter = false;
      }, 920);
      window.setTimeout(() => {
        scene.classList.remove("is-entering");
      }, 1240);
    }

    function activateWish(index) {
      const chip = chips[index];
      if (!chip) return;
      chips.forEach((item) => item.classList.remove("active"));
      chip.classList.add("active");
      wishText.textContent = chip.dataset.wish;
      const rect = chip.getBoundingClientRect();
      burst(rect.left + rect.width / 2, rect.top + rect.height / 2, 90);
      message.classList.add("show");
      message.textContent = `大哥，${chip.dataset.wish}`;
      statusLine.textContent = `WISH MODE · ${chip.textContent.trim()}`;
    }

    function revealNinoEgg(event) {
      event.stopPropagation();
      stopAutoSequence();
      memoryPhoto.src = "nino-easter-egg.jpeg";
      memoryPhoto.alt = "nino 的生日彩蛋照片";
      memoryCard.classList.add("is-nino");
      statusLine.textContent = "第二个彩蛋 · nino says Happy Birthday";
      const rect = memoryHotspot.getBoundingClientRect();
      burst(rect.left + rect.width / 2, rect.top + rect.height / 2, 180);
      startMusicSoftly(true);
    }

    function scheduleAutoSequence() {
      if (!autoMode) return;
      window.clearTimeout(autoTimer);
      autoTimer = window.setTimeout(() => {
        setChapter(1);
        autoTimer = window.setTimeout(() => {
          setChapter(2);
          autoTimer = window.setTimeout(() => {
            setChapter(3);
            autoTimer = window.setTimeout(() => {
              setChapter(4);
            }, 30000);
          }, 30000);
        }, 30000);
      }, 30000);
    }

    function stopAutoSequence() {
      autoMode = false;
      window.clearTimeout(autoTimer);
    }

    function requestChapter(targetIndex) {
      if (targetIndex === chapters.length - 1 && chapterIndex < chapters.length - 2) {
        setChapter(chapters.length - 2);
        return;
      }
      setChapter(targetIndex);
    }

    function trail(x, y, count = 5) {
      for (let i = 0; i < count; i += 1) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 1.6,
          vy: (Math.random() - 0.5) * 1.6,
          life: 28 + Math.random() * 20,
          size: Math.random() * 2 + 0.8,
          color: Math.random() > 0.5 ? "#ffe2a9" : "#9ceaff",
          spin: Math.random() * Math.PI,
          type: "dot"
        });
      }
    }

    function addMeteor(time) {
      if (time < nextMeteor) return;
      nextMeteor = time + 900 + Math.random() * 1700;
      meteors.push({
        x: Math.random() * width * 0.65,
        y: -60,
        vx: 5 + Math.random() * 2.4,
        vy: 2.8 + Math.random() * 1.6,
        life: 86,
        hue: Math.random() > 0.5 ? "255, 226, 169" : "156, 234, 255"
      });
    }

    function draw() {
      const time = performance.now();
      ctx.clearRect(0, 0, width, height);

      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "#050713");
      sky.addColorStop(0.45, "#0b1024");
      sky.addColorStop(1, "#03040a");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      for (const star of stars) {
        star.twinkle += star.speed;
        const alpha = 0.34 + Math.sin(star.twinkle) * 0.28;
        ctx.beginPath();
        ctx.arc(star.x + (pointer.x - width / 2) * 0.004, star.y + (pointer.y - height / 2) * 0.004, star.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 248, 237, ${alpha})`;
        ctx.fill();
      }

      addMeteor(time);
      meteors = meteors.filter((m) => m.life > 0 && m.x < width + 180);
      for (const m of meteors) {
        m.x += m.vx;
        m.y += m.vy;
        m.life -= 1;
        const alpha = Math.min(m.life / 50, 0.86);
        const gradient = ctx.createLinearGradient(m.x, m.y, m.x - m.vx * 18, m.y - m.vy * 18);
        gradient.addColorStop(0, `rgba(${m.hue}, ${alpha})`);
        gradient.addColorStop(1, `rgba(${m.hue}, 0)`);
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * 18, m.y - m.vy * 18);
        ctx.stroke();
      }

      if (pointer.active) {
        const glow = ctx.createRadialGradient(pointer.x, pointer.y, 0, pointer.x, pointer.y, 160);
        glow.addColorStop(0, "rgba(255, 226, 169, 0.16)");
        glow.addColorStop(0.42, "rgba(156, 234, 255, 0.06)");
        glow.addColorStop(1, "rgba(255, 226, 169, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(pointer.x - 160, pointer.y - 160, 320, 320);
      }

      waves = waves.filter((wave) => wave.life > 0);
      for (const wave of waves) {
        wave.radius += 5.2;
        wave.life -= 1;
        const alpha = Math.max(wave.life / 78, 0);
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${wave.hue}, ${alpha * 0.28})`;
        ctx.lineWidth = 1.4;
        ctx.stroke();
      }

      particles = particles.filter((p) => p.life > 0);
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.018;
        p.vx *= 0.992;
        p.life -= 1;
        p.spin += 0.08;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.spin);
        ctx.globalAlpha = Math.max(p.life / 72, 0);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 18;
        ctx.shadowColor = p.color;
        if (p.type === "ring") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size * 2.2, 0, Math.PI * 2);
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 1;
          ctx.stroke();
        } else if (p.type === "diamond") {
          ctx.beginPath();
          ctx.moveTo(0, -p.size * 2.4);
          ctx.lineTo(p.size * 1.4, 0);
          ctx.lineTo(0, p.size * 2.4);
          ctx.lineTo(-p.size * 1.4, 0);
          ctx.closePath();
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    function ensureAudio() {
      if (audio) return audio;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;
      const context = new AudioContext();
      const master = context.createGain();
      const compressor = context.createDynamicsCompressor();
      const padFilter = context.createBiquadFilter();
      const shimmerDelay = context.createDelay(1.2);
      const shimmerFeedback = context.createGain();
      const shimmerGain = context.createGain();
      master.gain.value = 0.96;
      compressor.threshold.value = -18;
      compressor.knee.value = 22;
      compressor.ratio.value = 7;
      compressor.attack.value = 0.012;
      compressor.release.value = 0.18;
      padFilter.type = "lowpass";
      padFilter.frequency.value = 980;
      shimmerDelay.delayTime.value = 0.54;
      shimmerFeedback.gain.value = 0.30;
      shimmerGain.gain.value = 0.88;
      shimmerDelay.connect(shimmerFeedback);
      shimmerFeedback.connect(shimmerDelay);
      shimmerDelay.connect(shimmerGain);
      shimmerGain.connect(master);
      master.connect(compressor);
      compressor.connect(context.destination);
      audio = { context, master, padFilter, shimmerDelay, step: 0 };
      return audio;
    }

    function playTone(freq, start, duration, gain = 0.05, type = "sine", destination = audio.master) {
      if (!audio) return;
      const osc = audio.context.createOscillator();
      const filter = audio.context.createBiquadFilter();
      const amp = audio.context.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      filter.type = "lowpass";
      filter.frequency.value = type === "triangle" ? 3400 : type === "sine" ? 1200 : 1800;
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(gain, start + 0.12);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(filter);
      filter.connect(amp);
      amp.connect(destination);
      osc.start(start);
      osc.stop(start + duration + 0.08);
    }

    function phrase() {
      if (!audio) return;
      const chords = [
        [196.00, 246.94, 293.66, 369.99, 440.00],
        [174.61, 220.00, 261.63, 329.63, 392.00],
        [164.81, 207.65, 246.94, 311.13, 369.99],
        [146.83, 196.00, 246.94, 293.66, 392.00]
      ];
      const now = audio.context.currentTime + 0.03;
      const chord = chords[audio.step % chords.length];
      playTone(chord[0] / 2, now, 5.2, 0.086, "sine", audio.master);
      [0, 1, 2, 4].forEach((noteIndex, index) => {
        playTone(chord[noteIndex], now + index * 0.09, 3.8, index === 0 ? 0.070 : 0.048, "sine", audio.master);
      });
      [0.18, 0.62, 1.06, 1.72, 2.28, 2.92].forEach((offset, index) => {
        const melody = [2, 4, 3, 4, 2, 1][index];
        playTone(chord[melody] * 2, now + offset, 1.08, 0.050, "triangle", audio.shimmerDelay);
      });
      audio.step += 1;
    }

    async function toggleMusic() {
      const engine = ensureAudio();
      if (!engine) return;
      if (engine.context.state === "suspended") await engine.context.resume();
      if (musicLoop) {
        clearInterval(musicLoop);
        musicLoop = null;
        musicToggle.classList.remove("playing");
        musicToggle.textContent = "播放 BGM";
        musicToggle.setAttribute("aria-pressed", "false");
        statusLine.textContent = "BGM PAUSED";
        return;
      }
      phrase();
      musicLoop = setInterval(phrase, 3600);
      musicToggle.classList.add("playing");
      musicToggle.textContent = "暂停 BGM";
      musicToggle.setAttribute("aria-pressed", "true");
      statusLine.textContent = "AMBIENT BGM · ON";
    }

    async function startMusicSoftly(fromGesture = false) {
      const engine = ensureAudio();
      if (!engine || musicLoop) return;
      const beginLoop = () => {
        if (musicLoop || engine.context.state !== "running") return false;
        phrase();
        musicLoop = setInterval(phrase, 3600);
        musicToggle.classList.add("playing");
        musicToggle.textContent = "暂停 BGM";
        musicToggle.setAttribute("aria-pressed", "true");
        statusLine.textContent = "AMBIENT BGM · ON";
        return true;
      };
      if (beginLoop()) return;
      try {
        if (engine.context.state === "suspended") {
          const resumePromise = engine.context.resume();
          if (fromGesture) {
            await Promise.race([
              resumePromise,
              new Promise((resolve) => window.setTimeout(resolve, 420))
            ]);
          }
          else resumePromise.catch(() => {});
        }
      } catch (error) {
        statusLine.textContent = "点击任意处开启 BGM · MOVE · CLICK";
        return;
      }
      if (fromGesture && beginLoop()) return;
      window.setTimeout(() => {
        if (!beginLoop() && !musicLoop) {
          musicToggle.textContent = "BGM 待唤醒";
          musicToggle.setAttribute("aria-pressed", "false");
          if (!statusLine.textContent.startsWith("SCENE") && !statusLine.textContent.startsWith("WISH") && !statusLine.textContent.includes("星轨")) {
            statusLine.textContent = "点击任意处开启 BGM · MOVE · CLICK";
          }
        }
      }, 260);
    }

    function wakeMusicOnGesture() {
      if (!musicLoop) {
        startMusicSoftly(true);
      }
      window.removeEventListener("click", wakeMusicOnGesture);
      window.removeEventListener("keydown", wakeMusicOnGesture);
      window.removeEventListener("touchstart", wakeMusicOnGesture);
    }

    window.addEventListener("click", wakeMusicOnGesture, { once: true });
    window.addEventListener("keydown", wakeMusicOnGesture, { once: true });
    window.addEventListener("touchstart", wakeMusicOnGesture, { once: true });

    launch.addEventListener("click", async () => {
      stopAutoSequence();
      message.classList.add("show");
      burst(width * 0.5, height * 0.42, 300);
      await startMusicSoftly(true);
      setChapter(chapterIndex + 1);
    });

    musicToggle.addEventListener("click", toggleMusic);

    chapterDots.forEach((dot) => {
      dot.addEventListener("click", () => {
        stopAutoSequence();
        requestChapter(Number(dot.dataset.chapterTarget));
      });
    });

    chips.forEach((chip) => {
      chip.addEventListener("click", () => {
        stopAutoSequence();
        requestChapter([...chips].indexOf(chip));
      });
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        stopAutoSequence();
        setChapter(chapterIndex + 1);
      }
      if (event.key === "ArrowLeft") {
        stopAutoSequence();
        setChapter(chapterIndex - 1);
      }
    });

    scene.addEventListener("click", (event) => {
      if (event.target.closest("button")) return;
      if (event.target.closest(".memory-card")) return;
      startMusicSoftly(true);
      stopAutoSequence();
      setChapter(chapterIndex + 1);
    });

    memoryHotspot.addEventListener("click", revealNinoEgg);

    scene.addEventListener("wheel", (event) => {
      const now = performance.now();
      if (now - lastWheelAt < 900 || Math.abs(event.deltaY) < 18) return;
      lastWheelAt = now;
      stopAutoSequence();
      setChapter(chapterIndex + (event.deltaY > 0 ? 1 : -1));
    }, { passive: true });

    scene.addEventListener("touchstart", (event) => {
      startMusicSoftly(true);
      const touch = event.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    scene.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy)) {
        stopAutoSequence();
        setChapter(chapterIndex + (dx < 0 ? 1 : -1));
      }
    }, { passive: true });

    window.addEventListener("pointermove", (event) => {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      pointer.active = true;
      document.documentElement.style.setProperty("--mx", `${event.clientX - width / 2}px`);
      document.documentElement.style.setProperty("--my", `${event.clientY - height / 2}px`);
      const now = performance.now();
      if (now - pointer.last > 42) {
        trail(pointer.x, pointer.y, 4);
        pointer.last = now;
      }
    });

    window.addEventListener("pointerdown", async (event) => {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      await startMusicSoftly(true);
      burst(pointer.x, pointer.y, 170);
      statusLine.textContent = "TOUCH RESPONSE · LIGHT BLOOM";
    });

    window.addEventListener("pointerleave", () => {
      pointer.active = false;
    });

    window.addEventListener("resize", resize);
    resize();
    draw();
    window.setTimeout(startMusicSoftly, 450);
    scheduleAutoSequence();
  </script>
</body>
</html>
